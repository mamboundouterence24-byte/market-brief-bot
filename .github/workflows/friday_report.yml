name: Weekly Market Intelligence Report

on:
  schedule:
    # Runs every Saturday at 09:45 AM WAT (08:45 AM UTC)
    - cron: '45 8 * * 6'
  workflow_dispatch: # Allows you to trigger a manual run from your phone

jobs:
  build:
    runs-on: ubuntu-latest # Using the standard GitHub-hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Bot
        env:
          # Mapping your GitHub Secrets to the Python script
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python main.py
