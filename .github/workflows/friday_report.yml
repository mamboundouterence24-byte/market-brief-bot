name: Weekly Market Report

on:
  schedule:
    # Saturday at 10:10 AM WAT (09:10 UTC)
    - cron: '10 9 * * 6'
    # Friday at 6:00 PM WAT (17:00 UTC)
    - cron: '0 17 * * 5'
  workflow_dispatch:
  
jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Libs
        run: pip install yfinance pandas lxml

      - name: Force Run
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |
          # This command finds the first .py file it sees and runs it
          SCRIPT=$(ls *.py | head -n 1)
          echo "Running script: $SCRIPT"
          python "$SCRIPT"
 
